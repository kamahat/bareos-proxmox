name: Publish apt repository

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag to publish (e.g. v1.0.1)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    container: debian:trixie-slim
    permissions:
      contents: write
      packages: write
      pages: write
      id-token: write

    steps:
      - name: Install tools
        run: |
          apt-get update -qq
          apt-get install -y --no-install-recommends \
            build-essential git dpkg-dev debhelper devscripts \
            python3 python3-pip reprepro gpg gpg-agent curl ca-certificates \
            oras

      - name: Install Python tools
        run: pip3 install --break-system-packages pytest bandit mypy

      - uses: actions/checkout@v4

      - name: Apply patch to generate src/
        run: |
          mkdir -p src
          cp upstream/bareos-fd-proxmox.py src/bareos_fd_proxmox.py
          patch -p0 src/bareos_fd_proxmox.py patch/bareos_fd_proxmox.patch

      - name: Analyse — pytest (gate)
        run: pytest tests/ -v --tb=short

      - name: Analyse — bandit (gate)
        run: bandit -r src/ scripts/ -ll -ii --skip B603,B606

      - name: Build .deb
        run: |
          chmod +x scripts/vzdump-bareos debian/postinst debian/rules
          dpkg-buildpackage -us -uc -b
          cp ../*.deb .

      - name: Import GPG signing key
        run: |
          echo "${{ secrets.APT_SIGNING_KEY }}" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec' | head -1 | cut -d: -f5)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> $GITHUB_ENV

      - name: Build apt repository
        run: |
          mkdir -p apt-repo/conf
          cat > apt-repo/conf/distributions << EOF
          Origin: kamahat/bareos-proxmox
          Label: bareos-proxmox
          Codename: stable
          Architectures: amd64
          Components: main
          Description: Bareos Proxmox VE plugin — GID-fix wrapper included
          SignWith: ${GPG_KEY_ID}
          EOF
          reprepro -b apt-repo includedeb stable ./*.deb
          # Add public key for users
          cp apt-signing-key.asc apt-repo/
          echo "Built apt repo:"
          ls -lR apt-repo/dists/

      - name: Deploy apt repo to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: apt-repo
          publish_branch: gh-pages
          keep_files: false
          commit_message: "apt: publish ${{ github.ref_name || inputs.version }}"

      - name: Push .deb as OCI package to GHCR
        run: |
          DEB=$(ls ./*.deb | head -1)
          VERSION="${{ github.ref_name || inputs.version }}"
          # Login to GHCR
          echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io --username ${{ github.actor }} --password-stdin
          # Push as OCI artifact — shows in GitHub Packages tab
          oras push \
            ghcr.io/kamahat/bareos-proxmox:${VERSION} \
            --artifact-type application/vnd.debian.package \
            ${DEB}:application/vnd.debian.package
          oras push \
            ghcr.io/kamahat/bareos-proxmox:latest \
            --artifact-type application/vnd.debian.package \
            ${DEB}:application/vnd.debian.package
          echo "Pushed to ghcr.io/kamahat/bareos-proxmox:${VERSION}"
